<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SPAM X Login</title>

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{

            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:#050816;

            overflow:hidden;
        }

        /* Background Glow */

        body::before{

            content:'';

            position:absolute;

            width:500px;
            height:500px;

            background:#ff2e63;

            filter:blur(180px);

            opacity:0.25;

            top:-150px;
            left:-100px;
        }

        body::after{

            content:'';

            position:absolute;

            width:400px;
            height:400px;

            background:#7f5af0;

            filter:blur(180px);

            opacity:0.2;

            bottom:-120px;
            right:-80px;
        }

        /* Login Card */

        .login-container{

            width:420px;

            background:rgba(15,15,35,0.9);

            padding:45px;

            border-radius:30px;

            border:1px solid rgba(255,255,255,0.1);

            backdrop-filter:blur(12px);

            box-shadow:0 0 40px rgba(255,46,99,0.2);

            position:relative;

            z-index:10;
        }

        .logo{

            text-align:center;

            font-size:48px;

            font-weight:700;

            margin-bottom:10px;
        }

        .logo span{

            color:#ff2e63;
        }

        .sub-title{

            text-align:center;

            color:#ccc;

            margin-bottom:35px;

            line-height:30px;

            font-size:18px;
        }

        /* Form */

        .form-group{

            margin-bottom:25px;
        }

        label{

            display:block;

            margin-bottom:10px;

            font-size:17px;

            color:white;

            font-weight:500;
        }

        input{

            width:100%;

            padding:16px;

            border:none;

            outline:none;

            border-radius:14px;

            background:#11152c;

            color:white;

            font-size:16px;

            border:1px solid rgba(255,255,255,0.1);

            transition:0.3s;
        }

        input:focus{

            border-color:#ff2e63;

            box-shadow:0 0 10px rgba(255,46,99,0.3);
        }

        input::placeholder{

            color:#999;
        }

        /* Button */

        .login-btn{

            width:100%;

            padding:17px;

            border:none;

            border-radius:50px;

            background:#ff2e63;

            color:white;

            font-size:18px;

            font-weight:600;

            cursor:pointer;

            transition:0.3s;

            margin-top:10px;

            box-shadow:0 0 20px rgba(255,46,99,0.4);
        }

        .login-btn:hover{

            transform:translateY(-5px);

            background:white;

            color:#ff2e63;
        }

        /* Bottom Text */

        .bottom-text{

            margin-top:30px;

            text-align:center;

            color:#ccc;

            font-size:16px;
        }

        .bottom-text a{

            color:#ff2e63;

            text-decoration:none;

            font-weight:600;
        }

        .bottom-text a:hover{

            text-decoration:underline;
        }

        /* Emergency Access */

        .emergency-link{

            text-align:center;

            margin-top:25px;
        }

        .emergency-link a{

            color:#ff4d4d;

            text-decoration:none;

            font-weight:600;

            font-size:15px;
        }

        .emergency-link a:hover{

            text-decoration:underline;
        }

    </style>

</head>

<body>

    <!-- Login Box -->

    <div class="login-container">

        <!-- Logo -->

        <div class="logo">

            <span>SPAM</span> X

        </div>

        <!-- Subtitle -->

        <div class="sub-title">

            Smart Emergency Response System

        </div>

        <!-- Login Form -->

        <form onsubmit="loginUser(event)">

            <!-- Email -->

            <div class="form-group">

                <label>Email Address</label>

                <input type="email"
                       placeholder="Enter your email"
                       required>

            </div>

            <!-- Password -->

            <div class="form-group">

                <label>Password</label>

                <input type="password"
                       placeholder="Enter your password"
                       required>

            </div>

            <!-- Login Button -->

            <button type="submit"
                    class="login-btn">

                Login

            </button>

        </form>

        <!-- Register -->

        <div class="bottom-text">

            Don't have an account?

            <a href="register.html">

                Register

            </a>

        </div>

        <!-- Emergency Access -->

        <div class="emergency-link">

            <a href="contact.html">

                🚨 Emergency Access Without Login

            </a>

        </div>

    </div>

    <!-- JavaScript -->

    <script>

        function loginUser(event){

            event.preventDefault();

            alert("✅ Login Successful!");

            window.location.href = "dashboard.html";

        }

    </script>

</body>

</html>
