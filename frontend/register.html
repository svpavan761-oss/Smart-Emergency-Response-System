<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SPAM X Register</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#050816;
            overflow:hidden;
            position:relative;
        }

        /* Background Glow */

        body::before{
            content:'';
            position:absolute;
            width:350px;
            height:350px;
            background:#ff2e63;
            border-radius:50%;
            top:-120px;
            left:-100px;
            filter:blur(120px);
            opacity:0.5;
        }

        body::after{
            content:'';
            position:absolute;
            width:350px;
            height:350px;
            background:#08d9d6;
            border-radius:50%;
            bottom:-120px;
            right:-100px;
            filter:blur(120px);
            opacity:0.4;
        }

        /* Register Container */

        .register-container{
            width:420px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.1);
            backdrop-filter:blur(15px);
            padding:40px;
            border-radius:25px;
            position:relative;
            z-index:10;
            box-shadow:0 0 25px rgba(0,0,0,0.4);
        }

        .logo{
            text-align:center;
            font-size:38px;
            font-weight:700;
            color:#ff2e63;
            margin-bottom:10px;
            letter-spacing:2px;
        }

        .logo span{
            color:white;
        }

        .title{
            text-align:center;
            color:white;
            margin-bottom:30px;
            font-size:18px;
            font-weight:300;
        }

        /* Input Box */

        .input-box{
            margin-bottom:20px;
        }

        .input-box label{
            color:white;
            display:block;
            margin-bottom:8px;
            font-size:15px;
        }

        .input-box input{
            width:100%;
            padding:14px;
            border:none;
            outline:none;
            border-radius:12px;
            background:#11152c;
            color:white;
            font-size:15px;
            border:1px solid transparent;
            transition:0.3s;
        }

        .input-box input:focus{
            border-color:#ff2e63;
            box-shadow:0 0 10px rgba(255,46,99,0.5);
        }

        /* Register Button */

        .btn{
            width:100%;
            padding:15px;
            border:none;
            outline:none;
            background:#ff2e63;
            color:white;
            font-size:17px;
            font-weight:600;
            border-radius:12px;
            cursor:pointer;
            transition:0.3s;
            margin-top:10px;
            box-shadow:0 0 15px rgba(255,46,99,0.5);
        }

        .btn:hover{
            transform:translateY(-3px);
            background:white;
            color:#ff2e63;
        }

        /* Extra */

        .extra{
            margin-top:20px;
            text-align:center;
            color:#ccc;
            font-size:14px;
        }

        .extra a{
            color:#ff2e63;
            text-decoration:none;
            font-weight:500;
        }

        .extra a:hover{
            text-decoration:underline;
        }

        /* Responsive */

        @media(max-width:500px){

            .register-container{
                width:90%;
                padding:30px;
            }

        }

    </style>

</head>

<body>

    <!-- Register Box -->

    <div class="register-container">

        <div class="logo">
            SPAM <span>X</span>
        </div>

        <div class="title">
            Smart Emergency Response System
        </div>

        <form onsubmit="registerUser(event)">

            <div class="input-box">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>

            <div class="input-box">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <div class="input-box">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm password" required>
            </div>

            <button type="submit" class="btn">
                Register
            </button>

        </form>

        <div class="extra">
            Already have an account?
            <a href="login.html">Login</a>
        </div>

    </div>

    <!-- JavaScript -->

    <script>

        function registerUser(event){

            event.preventDefault();

            let password = document.getElementById("password").value;
            let confirmPassword = document.getElementById("confirmPassword").value;

            if(password !== confirmPassword){

                alert("❌ Passwords do not match!");
                return;

            }

            alert("✅ Registration Successful!");

            window.location.href = "login.html";

        }

    </script>

</body>
</html>
